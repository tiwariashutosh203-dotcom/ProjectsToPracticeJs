<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promises</title>
</head>
<body>
<script>

const promiseOne = new Promise(function(resolve,reject){

setTimeout(()=>{
console.log("Async task complete");

resolve();
},1000)

})

promiseOne.then(()=>{
console.log("Promise consumed");
})

new Promise(function(resolve,reject){
    setTimeout(()=>{
        console.log("This is working? ");
        resolve();
    },2000)

}).then(()=>{
    console.log("Async 2");
})


//promise 3 resolve data bhejunga aur then me recive

const promiseThree=new Promise((resolve,reject)=>{
        setTimeout(()=>{
              console.log("This is promise-3");
              resolve({username:"Ashutosh", email:"tiwariashutosh203@gmail.com"});

        },1000)
})
promiseThree.then((user)=>{
    console.log(user);
})


//promise-4
const promiseFour=new Promise((resolve,reject)=>{
    setTimeout(()=>{
        let error=false;
        if(!error){
            resolve({username:"hitesh",password:"123"});

        }else{
            reject('Error: Something went wrong');

        }

    },1000)

})

promiseFour
.then((user)=>{
          console.log(user);
          return user.username;
})
.then((username)=>{
    console.log(username);

})
.catch((error)=>{
   console.log(error);

}).finally(()=>{
    console.log("the is executed and either resolve or rejected");
})


//promise -5
const promiseFive=new Promise((resolve,reject)=>{
         setTimeout(()=>{
            let error=false;
            if(!error){
                resolve({username:"js",password:"12345"});

            }else{
                reject('Error');
            }

         },1000)
})

//way to handle promises
// we use async and await
//async:
//await:

async function consumePromiseFive(){
    try{
    const response=await promiseFive
    console.log(response);
    }catch(error){ console.log(error);
    }
}
consumePromiseFive();


//fetch
async function getAllUsers(){
    try{
        const response=await fetch('https://jsonplaceholder.typicode.com/users')
        const data=await response.json()
        console.log(data)
    }catch(error){
        console.log("E: ",error);

    }
}
getAllUsers()



//method -2 to do above task

fetch('https://jsonplaceholder.typicode.com/users')
.then((response)=>{
    return response.json();

}).then((data)=>{
    console.log(data);

}).catch((error)=>{
    console.log(error);
})

</script>

    
</body>

</html>
